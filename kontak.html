<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak Kami - TechStore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
       <div class="top-bar">
        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
            <div class="logo">TechStore</div></div>
        <nav id="nav-menu">
        <ul>
            <li><a href="index.html">Beranda</a></li>
            <li><a href="katalog.html">Produk</a></li>
            <li><a href="tentang.html">Tentang Kami</a></li>
            <li><a href="kontak.html">Kontak</a></li>
        </ul>
    </nav>
    </header>

    <main class="container">
        <div class="contact-wrapper" style="display: flex; flex-wrap: wrap; gap: 50px; padding: 50px 0;">
            
            <div class="contact-form" style="flex: 1; min-width: 300px; background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--neon-blue);">
                <h2 style="color: var(--neon-blue); margin-bottom: 20px;">Kirim Pesan</h2>
                <form id="formKontak">
                    <input type="text" placeholder="Nama Lengkap" style="width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: white;">
                    <input type="email" placeholder="Email Anda" style="width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: white;">
                    <textarea placeholder="Pesan Anda" rows="5" style="width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: white;"></textarea>
                    <button type="submit" style="width: 100%;">Kirim Sekarang</button>
                </form>
            </div>

            <div class="contact-info" style="flex: 1; min-width: 300px;">
                <h2 style="color: var(--neon-blue);">Lokasi Toko</h2>
                <p style="margin: 15px 0;">Jl. Teknologi Raya No. 101, Lantai 2, Jakarta Pusat</p>
                <div class="map-container" style="border: 2px solid var(--neon-blue); border-radius: 10px; overflow: hidden;">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3966.66642232732!2d106.8249641!3d-6.1753924!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e69f5d2e764b12d%3A0x3d2ad239d1159971!2sMonas!5e0!3m2!1sid!2sid!4v1700000000000" width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>

        </div>
    </main>

    <footer style="margin-top: 50px;">
        <p style="text-align: center; color: var(--text-dim);">&copy; 2026 TechStore. Hak Cipta Dilindungi.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
